<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERRO-AI • Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .chat-container { scrollbar-width: thin; scrollbar-color: #475569 #1e2937; }
        .message { max-width: 78%; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .ai-bubble { background: linear-gradient(145deg, #334155, #1e2937); border: 1px solid #475569; }
        .user-bubble { background: linear-gradient(145deg, #6366f1, #4f46e5); }
        .model-card { transition: all 0.2s ease; }
        .model-card.active { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="flex h-screen">
        
        <!-- Sidebar -->
        <div class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col">
            
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-robot text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">SERRO-AI</h1>
                        <p class="text-xs text-slate-500">Premium • Fireworks</p>
                    </div>
                </div>
            </div>

            <!-- Model Seçimi -->
            <div class="p-4 flex-1 overflow-y-auto">
                <div class="text-xs font-semibold text-slate-400 px-3 mb-3">MODELLER</div>
                
                <div onclick="selectModel('glm-4p7')" class="model-card active cursor-pointer bg-slate-800 hover:bg-slate-700 border border-indigo-500 rounded-2xl p-4 mb-3" id="model-glm-4p7">
                    <div class="font-semibold">GLM 4.7</div>
                    <div class="text-xs text-emerald-400">Dengeli • Güçlü</div>
                </div>
                
                <div onclick="selectModel('qwen3-235b')" class="model-card cursor-pointer bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-2xl p-4 mb-3" id="model-qwen3-235b">
                    <div class="font-semibold">Qwen3 235B</div>
                    <div class="text-xs text-emerald-400">Hızlı • Yaratıcı</div>
                </div>
                
                <div onclick="selectModel('kimi-k2-6')" class="model-card cursor-pointer bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-2xl p-4 mb-3" id="model-kimi-k2-6">
                    <div class="font-semibold">Kimi K2.6</div>
                    <div class="text-xs text-emerald-400">Uzun bağlam • Akıllı</div>
                </div>
                
                <div onclick="selectModel('glm-5')" class="model-card cursor-pointer bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-2xl p-4 mb-3" id="model-glm-5">
                    <div class="font-semibold">GLM 5</div>
                    <div class="text-xs text-emerald-400">En yeni • En güçlü</div>
                </div>
            </div>

            <div class="p-4 border-t border-slate-800">
                <button onclick="clearChat()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-red-900/30 text-red-400 py-2.5 rounded-2xl text-sm transition-colors">
                    <i class="fas fa-trash-alt"></i>
                    <span>Sohbeti Temizle</span>
                </button>
            </div>
        </div>

        <!-- Ana Chat -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-slate-800 bg-slate-900 flex items-center px-6 justify-between">
                <div class="flex items-center gap-4">
                    <div id="currentModel" class="font-semibold text-lg">GLM 4.7</div>
                    <div class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs rounded-full font-medium">Çevrimiçi</div>
                </div>
                <div class="text-sm text-slate-400">SERRO-AI • Fireworks</div>
            </div>

            <div id="chatBox" class="flex-1 overflow-y-auto p-6 chat-container space-y-6 bg-slate-950"></div>

            <div class="p-4 border-t border-slate-800 bg-slate-900">
                <div class="flex items-center gap-3 max-w-4xl mx-auto">
                    <input id="userInput" type="text" placeholder="Mesajını yaz..." 
                           class="flex-1 bg-slate-800 border border-slate-700 focus:border-indigo-500 rounded-3xl px-6 py-4 text-white placeholder-slate-500 focus:outline-none">
                    <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-700 w-14 h-14 flex items-center justify-center rounded-3xl shadow-lg transition-all active:scale-95">
                        <i class="fas fa-paper-plane text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "fw_Je5Mi4HAFxaKPr9b15GC9Y";
        
        const models = {
            "glm-4p7": "accounts/fireworks/models/glm-4p7",
            "qwen3-235b": "accounts/fireworks/models/qwen3-235b-a22b",
            "kimi-k2-6": "accounts/fireworks/models/kimi-k2-6",
            "glm-5": "accounts/fireworks/models/glm-5"
        };
        
        let currentModel = "glm-4p7";
        let chatHistory = [];

        function selectModel(modelKey) {
            document.querySelectorAll('.model-card').forEach(el => {
                el.classList.remove('active', 'border-indigo-500');
                el.classList.add('border-slate-700');
            });
            
            const activeCard = document.getElementById(`model-${modelKey}`);
            activeCard.classList.add('active', 'border-indigo-500');
            activeCard.classList.remove('border-slate-700');
            
            currentModel = modelKey;
            document.getElementById('currentModel').innerText = activeCard.querySelector('.font-semibold').innerText;
        }

        function addMessage(content, isUser) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            if (isUser) {
                messageDiv.innerHTML = `<div class="message user-bubble px-5 py-3.5 rounded-3xl rounded-br-none text-white"><p>${content}</p></div>`;
            } else {
                messageDiv.innerHTML = `
                    <div class="message ai-bubble px-5 py-3.5 rounded-3xl rounded-bl-none max-w-[78%]">
                        <p class="whitespace-pre-wrap">${content}</p>
                        <div class="flex justify-end mt-2">
                            <button onclick="copyToClipboard(this)" class="text-slate-400 hover:text-white text-xs flex items-center gap-1">
                                <i class="fas fa-copy"></i> <span>Kopyala</span>
                            </button>
                        </div>
                    </div>`;
            }
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            chatHistory.push({ content, isUser });
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
        }

        function copyToClipboard(element) {
            const text = element.parentElement.parentElement.querySelector('p').innerText;
            navigator.clipboard.writeText(text);
            const original = element.innerHTML;
            element.innerHTML = `<i class="fas fa-check"></i> Kopyalandı`;
            setTimeout(() => element.innerHTML = original, 1500);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            if (!input.value.trim()) return;

            const message = input.value;
            addMessage(message, true);
            input.value = '';

            const chatBox = document.getElementById('chatBox');
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex justify-start';
            typing.innerHTML = `<div class="message ai-bubble px-5 py-3 rounded-3xl"><div class="flex gap-1"><div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay:0.2s"></div><div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay:0.4s"></div></div></div>`;
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://api.fireworks.ai/inference/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: models[currentModel],
                        messages: [{ role: "user", content: message }],
                        max_tokens: 2500,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                document.getElementById('typing').remove();
                addMessage(data.choices[0].message.content, false);
            } catch (e) {
                document.getElementById('typing').remove();
                addMessage("Bir hata oluştu. Lütfen tekrar deneyin.", false);
            }
        }

        function clearChat() {
            if (confirm("Sohbeti temizlemek istiyor musun?")) {
                document.getElementById('chatBox').innerHTML = '';
                chatHistory = [];
                localStorage.removeItem('chatHistory');
            }
        }

        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        window.onload = function() {
            const saved = localStorage.getItem('chatHistory');
            if (saved) {
                chatHistory = JSON.parse(saved);
                const chatBox = document.getElementById('chatBox');
                chatHistory.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `flex ${msg.isUser ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = msg.isUser ? 
                        `<div class="message user-bubble px-5 py-3.5 rounded-3xl rounded-br-none">${msg.content}</div>` :
                        `<div class="message ai-bubble px-5 py-3.5 rounded-3xl rounded-bl-none">${msg.content}</div>`;
                    chatBox.appendChild(div);
                });
            } else {
                setTimeout(() => addMessage("Merhaba! SERRO-AI'ye hoş geldin. Sol taraftan model seçebilirsin.", false), 600);
            }
            
            document.getElementById('model-glm-4p7').classList.add('active', 'border-indigo-500');
            document.getElementById('currentModel').innerText = "GLM 4.7";
        }
    </script>
</body>
</html>
